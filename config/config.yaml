# Portfolio Management System Configuration

project:
  name: nifty50-portfolio-ml
  version: "1.0.0"

data:
  tickers:
    # Nifty 50 all components
    - ADANIENT.NS
    - ADANIPORTS.NS
    - APOLLOHOSP.NS
    - ASIANPAINT.NS
    - AXISBANK.NS
    - BAJAJ-AUTO.NS
    - BAJFINANCE.NS
    - BAJAJFINSV.NS
    - BHARTIARTL.NS
    - BPCL.NS
    - BRITANNIA.NS
    - CIPLA.NS
    - COALINDIA.NS
    - DIVISLAB.NS
    - DRREDDY.NS
    - EICHERMOT.NS
    - GRASIM.NS
    - HCLTECH.NS
    - HDFCBANK.NS
    - HDFCLIFE.NS
    - HEROMOTOCO.NS
    - HINDALCO.NS
    - HINDUNILVR.NS
    - ICICIBANK.NS
    - INDUSINDBK.NS
    - INFY.NS
    - ITC.NS
    - JSWSTEEL.NS
    - KOTAKBANK.NS
    - LT.NS
    - LTIM.NS
    - M&M.NS
    - MARUTI.NS
    - NESTLEIND.NS
    - NTPC.NS
    - ONGC.NS
    - POWERGRID.NS
    - RELIANCE.NS
    - SBILIFE.NS
    - SBIN.NS
    - SHRIRAMFIN.NS
    - SUNPHARMA.NS
    - TATACONSUM.NS
    - TATAMOTORS.NS
    - TATASTEEL.NS
    - TCS.NS
    - TECHM.NS
    - TITAN.NS
    - ULTRACEMCO.NS
    - WIPRO.NS
    - ^NSEI # Nifty 50 Index
  start_date: "2015-01-01"
  raw_dir: "data/raw"
  processed_dir: "data/processed"

database:
  url: "sqlite:///data/portfolio.db" # Defaulting to sqlite for local dev, can be replaced by postgres url

model:
  return_predictor:
    type: "random_forest"
    rf_params:
      n_estimators: 100
      max_depth: 5
      min_samples_split: 10
      random_state: 42
    target_clip: [0.01, 0.99]
    split_year: 2023
    model_path: "src/models/return_predictor/rf_model.joblib"
    
  volatility:
    garch_window: 756 # ~3 years
    
  regime:
    n_states: 3
    model_path: "src/models/regime/hmm_model.joblib"

optimizer:
  max_weight: 0.20
  transaction_cost: 0.001
  base_risk_aversion: 0.5
  bear_risk_aversion: 1.0

backtest:
  start_year: 2023
  end_year: 2026
  rebalance_freq: "M"

api:
  host: "0.0.0.0"
  port: 8000
